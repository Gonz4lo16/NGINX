name: Saludo con Variable

on:
  push:
    branches:
      - main
      - develop

# Aquí definimos tu nombre como variable global
env:
  MI_NOMBRE: "Gonzalo Pereda"

jobs:
  saludo:
    runs-on: ubuntu-latest
    steps:
      - name: Saludo desde main
        if: github.ref == 'refs/heads/main'
        run: echo "Hola desde main, soy $MI_NOMBRE"

      - name: Saludo desde develop
        if: github.ref == 'refs/heads/develop'
        run: echo "Hola desde develop, soy $MI_NOMBRE"
